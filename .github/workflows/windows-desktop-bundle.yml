name: Windows Desktop Bundle

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-bundle:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt fastapi uvicorn pyinstaller

      - name: Build bundled Python backend
        run: |
          if (Test-Path dist\backend) {
            Remove-Item -LiteralPath dist\backend -Recurse -Force
          }
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --noconsole `
            --name file_organizer_api `
            --paths . `
            --collect-submodules file_organizer `
            --collect-submodules uvicorn `
            --collect-submodules fastapi `
            file_organizer/api/__main__.py
          New-Item -ItemType Directory -Force -Path dist\backend | Out-Null
          Copy-Item -LiteralPath dist\file_organizer_api.exe -Destination dist\backend\file_organizer_api.exe -Force

      - name: Build Windows desktop bundle
        working-directory: desktop
        env:
          CI: "true"
        run: npm run tauri:build

      - name: Smoke test installed desktop bundle
        shell: pwsh
        run: |
          $msi = Get-ChildItem 'desktop/src-tauri/target/release/bundle/msi' -Recurse -Filter *.msi | Select-Object -First 1
          if (-not $msi) {
            throw "MSI bundle was not found."
          }

          $install = Start-Process msiexec.exe -ArgumentList '/i', $msi.FullName, '/qn', '/norestart' -PassThru -Wait
          if ($install.ExitCode -ne 0) {
            throw "MSI install failed with exit code $($install.ExitCode)"
          }

          $candidates = @(
            (Join-Path $env:LOCALAPPDATA 'Programs\FilePilot\FilePilot.exe'),
            (Join-Path $env:ProgramFiles 'FilePilot\FilePilot.exe'),
            (Join-Path ${env:ProgramFiles(x86)} 'FilePilot\FilePilot.exe')
          ) | Where-Object { $_ -and (Test-Path -LiteralPath $_) }

          $app = $candidates | Select-Object -First 1
          if (-not $app) {
            $searchRoots = @($env:LOCALAPPDATA, $env:ProgramFiles, ${env:ProgramFiles(x86)}) | Where-Object { $_ -and (Test-Path -LiteralPath $_) }
            foreach ($root in $searchRoots) {
              $match = Get-ChildItem $root -Recurse -Filter FilePilot.exe -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($match) {
                $app = $match.FullName
                break
              }
            }
          }

          if (-not $app) {
            throw "Installed FilePilot.exe was not found after MSI install."
          }

          powershell -ExecutionPolicy Bypass -File scripts\smoke_desktop_bundle.ps1 -AppPath $app

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: filepilot-windows-bundle
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe
