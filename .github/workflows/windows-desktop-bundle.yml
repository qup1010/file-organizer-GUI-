name: Windows Desktop Bundle

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-bundle:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt fastapi uvicorn pyinstaller

      - name: Build bundled Python backend
        run: |
          if (Test-Path dist\backend) {
            Remove-Item -LiteralPath dist\backend -Recurse -Force
          }
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --noconsole `
            --name file_organizer_api `
            --paths . `
            --collect-submodules file_organizer `
            --collect-submodules uvicorn `
            --collect-submodules fastapi `
            file_organizer/api/__main__.py
          New-Item -ItemType Directory -Force -Path dist\backend | Out-Null
          Copy-Item -LiteralPath dist\file_organizer_api.exe -Destination dist\backend\file_organizer_api.exe -Force

      - name: Build Windows desktop bundle
        working-directory: desktop
        env:
          CI: "true"
        run: npm run tauri:build

      - name: Smoke test installed desktop bundle
        shell: pwsh
        run: |
          $builtExe = Get-ChildItem 'desktop/src-tauri/target/release' -Filter *.exe |
            Where-Object { $_.Name -ne 'file_organizer_api.exe' } |
            Select-Object -First 1
          if (-not $builtExe) {
            throw "Built desktop executable was not found."
          }
          $desktopExeName = $builtExe.Name

          $msi = Get-ChildItem 'desktop/src-tauri/target/release/bundle/msi' -Recurse -Filter *.msi | Select-Object -First 1
          if (-not $msi) {
            throw "MSI bundle was not found."
          }

          $install = Start-Process msiexec.exe -ArgumentList '/i', $msi.FullName, '/qn', '/norestart' -PassThru -Wait
          if ($install.ExitCode -ne 0) {
            throw "MSI install failed with exit code $($install.ExitCode)"
          }

          $candidates = @(
            (Join-Path $env:LOCALAPPDATA "Programs\FilePilot\$desktopExeName"),
            (Join-Path $env:ProgramFiles "FilePilot\$desktopExeName"),
            (Join-Path ${env:ProgramFiles(x86)} "FilePilot\$desktopExeName")
          ) | Where-Object { $_ -and (Test-Path -LiteralPath $_) }

          $app = $candidates | Select-Object -First 1
          if (-not $app) {
            $searchRoots = @($env:LOCALAPPDATA, $env:ProgramFiles, ${env:ProgramFiles(x86)}) | Where-Object { $_ -and (Test-Path -LiteralPath $_) }
            foreach ($root in $searchRoots) {
              $match = Get-ChildItem $root -Recurse -Filter $desktopExeName -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($match) {
                $app = $match.FullName
                break
              }
            }
          }

          if (-not $app) {
            throw "Installed $desktopExeName was not found after MSI install."
          }

          powershell -ExecutionPolicy Bypass -File scripts\smoke_desktop_bundle.ps1 -AppPath $app

      - name: Dump desktop smoke diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          $runtimeRoot = Join-Path $env:APPDATA 'com.fileorganizer.desktop'
          Write-Output "runtimeRoot=$runtimeRoot"
          if (Test-Path -LiteralPath $runtimeRoot) {
            Get-ChildItem $runtimeRoot -Recurse -Force | Select-Object FullName, Length | Format-Table -AutoSize | Out-String -Width 240 | Write-Output
          }

          $runtimeFile = Join-Path $runtimeRoot 'output\runtime\backend.json'
          if (Test-Path -LiteralPath $runtimeFile) {
            Write-Output '=== backend.json ==='
            Get-Content -LiteralPath $runtimeFile -Raw -Encoding utf8 | Write-Output
          }

          $logFile = Join-Path $runtimeRoot 'logs\backend\runtime.log'
          if (Test-Path -LiteralPath $logFile) {
            Write-Output '=== runtime.log ==='
            Get-Content -LiteralPath $logFile -Encoding utf8 | Select-Object -Last 120 | Write-Output
          }

          Get-Process -Name 'file_organizer_api' -ErrorAction SilentlyContinue | Format-Table Id, ProcessName, Path -AutoSize | Out-String -Width 240 | Write-Output

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: filepilot-windows-bundle
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe
